name: SonarQube
on:
  push:
    branches:
      - main
      - dev
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build:
    name: Build and analyze
    runs-on: windows-latest
    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'zulu'

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Vô hiệu hóa shallow clone để đảm bảo tính chính xác của báo cáo Sonar

      - name: Cache SonarQube packages
        uses: actions/cache@v4
        with:
          path: ~\.sonar\cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Cache SonarQube scanner
        id: cache-sonar-scanner
        uses: actions/cache@v4
        with:
          path: .\.sonar\scanner
          key: ${{ runner.os }}-sonar-scanner
          restore-keys: ${{ runner.os }}-sonar-scanner

      - name: Install SonarQube scanner
        if: steps.cache-sonar-scanner.outputs.cache-hit != 'true'
        shell: powershell
        run: |
          New-Item -Path .\.sonar\scanner -ItemType Directory
          dotnet tool update dotnet-sonarscanner --tool-path .\.sonar\scanner

      - name: Build and analyze
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          # Thắt lưng buộc bụng bộ nhớ Java để tránh lỗi sập Pagefile của máy ảo Windows
          _JAVA_OPTIONS: "-Xmx2g -Xms512m"
          SONAR_SCANNER_OPTS: "-Xmx2g -Xms512m"
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          $PSNativeCommandUseErrorActionPreference = $true
          
          # 1. BEGIN STEP
          .\.sonar\scanner\dotnet-sonarscanner begin /k:"AnPhuoc2410_Kiremon" /o:"anphuoc2410" /d:sonar.token="${{ secrets.SONAR_TOKEN }}" /d:sonar.host.url="https://sonarcloud.io" /d:sonar.projectBaseDir="${{ github.workspace }}" /d:sonar.scanner.scanAll=false /d:sonar.cs.opencover.reportsPaths="TestResults\*\coverage.opencover.xml" /d:sonar.exclusions="**/node_modules/**/*,**/bin/**/*,**/obj/**/*,**/.agents/**/*,**/.github/**/*,**/docs/**/*,**/pokedexreactasp.client/public/**/*,**/pokedexreactasp.client/src/assets/**/*,**/.vs/**/*"
          
          # 2. BUILD STEP
          dotnet build --no-incremental --disable-build-servers
          
          # 3. RUN TESTS
          dotnet test --no-build --verbosity normal --collect:"XPlat Code Coverage;Format=opencover" --results-directory .\TestResults
          
          .\.sonar\scanner\dotnet-sonarscanner end /d:sonar.token="${{ secrets.SONAR_TOKEN }}"