services:
  api:
    image: ${DOCKER_IMAGE_NAME}:latest
    container_name: kiremon_api
    restart: unless-stopped

    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE

    env_file:
      - .env

    environment:
      - ConnectionStrings__Redis=redis:6379
      - OpenTelemetry__Enabled=true
      - OpenTelemetry__OtlpEndpoint=http://global_alloy:4317
      - OpenTelemetry__ServiceName=kiremon_api

    ports:
      - "${API_PORT:-2410}:8080"

    depends_on:
      - redis

    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.00"
        reservations:
          memory: 1G
          cpus: "1.00"

    networks:
      - default
      - global_lgtm

  redis:
    image: redis:7-alpine
    container_name: kiremon_redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning

    volumes:
      - ./data/redis:/data
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

    networks:
      - default

networks:
  default:
    driver: bridge
  global_lgtm:
    external: true
