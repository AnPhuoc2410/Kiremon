# =============================================================================
# Tempo Configuration — Single Binary (Docker / VPS / LGTM Stack)
# Optimized for: Alloy + Grafana + Prometheus + Loki integration
# =============================================================================
server:
  http_listen_port: 3200
  grpc_listen_port: 9095
  log_level: info

# =============================================================================
# OTLP Receiver (primary ingestion method)
# =============================================================================
distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: "0.0.0.0:4317"
        http:
          endpoint: "0.0.0.0:4318"

# =============================================================================
# Ingester (buffer traces before flushing to storage)
# =============================================================================
ingester:
  max_block_bytes: 1000000         # ~1MB — safe for single VPS
  max_block_duration: 5m
  trace_idle_period: 10s

# =============================================================================
# Storage (local disk - single VPS mode)
# =============================================================================
storage:
  trace:
    backend: local
    local:
      path: /var/tempo/traces
    wal:
      path: /var/tempo/wal

# =============================================================================
# Metrics Generator (Service Graph + RED metrics)
# Enables Grafana Service Map / Trace metrics
# =============================================================================
metrics_generator:
  registry:
    external_labels:
      source: tempo
      cluster: local
    max_label_value_length: 128
    stale_duration: 15m
  storage:
    path: /var/tempo/generator/wal
    remote_write:
      - url: http://prometheus:9090/api/v1/write
        send_exemplars: true

# =============================================================================
# Query settings
# =============================================================================
query_frontend:
  search:
    duration_slo: 5s
    throughput_bytes_slo: 1073741824  # 1GiB
  trace_by_id:
    duration_slo: 5s

# =============================================================================
# Compactor
# =============================================================================
compactor:
  compaction:
    block_retention: 336h           # 14 days
    compacted_block_retention: 1h   # cleanup original blocks after compaction

# =============================================================================
# Overrides (enable modern trace analytics features)
# =============================================================================
overrides:
  defaults:
    metrics_generator:
      processors:
        - service-graphs
        - span-metrics
        - local-blocks
      generate_native_histograms: both

# =============================================================================
# Analytics (disabled)
# =============================================================================
usage_report:
  reporting_enabled: false